spring:
  datasource:
    url: jdbc:h2:mem:event_driven_ledger;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:29092

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  outbox:
    publisher:
      type: logging
    kafka:
      topic-name: ledger.journal.entries
      partitions: 1
      replication-factor: 1
    processor:
      enabled: false
      batch-size: 20
      fixed-delay-ms: 30000
      initial-delay-ms: 5000
